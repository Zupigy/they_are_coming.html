<content type="html"><!--[CDATA[

<!DOCTYPE html-->

<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/awaiblecomponent/575@main/style.css">

<style>
        /* Remove selection on key press */
        canvas:focus {
            outline: none;
        }

        html, body {
            /* Remove margins */
            padding: 0;
            margin: 0;
            /* Disable scroll and long tap on iOS */
            overflow: hidden;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
            /* Set height to 100% */
            height: 100%;
            width: 100%;
        }
        
        /* Fullscreen button styling */
        #fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 9999;
            padding: 10px 15px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.3s ease;
            display: none;
            touch-action: manipulation;
        }
        
        #fullscreen-btn.visible {
            display: block;
        }
        
        #fullscreen-btn:hover {
            background-color: rgba(0, 0, 0, 0.9);
        }
        
        #fullscreen-btn:active {
            transform: scale(0.95);
        }
        
        /* Hide button when in fullscreen */
        #fullscreen-btn.fullscreen {
            display: none;
        }
        
        /* Desktop only - hide on mobile phones/tablets */
        @media (max-width: 1024px) and (hover: none) and (pointer: coarse) {
            #fullscreen-btn {
                display: none !important;
            }
            #unity-container {
                display: none !important;
            }
            body::after {
                content: "This game is for desktop only. Please access from a computer.";
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: rgba(0, 0, 0, 0.9);
                color: white;
                padding: 40px;
                border-radius: 10px;
                font-size: 20px;
                text-align: center;
                z-index: 10000;
                font-family: Arial, sans-serif;
            }
        }
    </style>

<div id="unity-container" class="unity-desktop">
<canvas id="unity-canvas" tabindex="-1" width="1910" height="923"></canvas>
</div>

<div id="loading-cover" style="background: url(&quot;background.png&quot;) center center / cover; display: none;">
<div id="unity-loading-bar" style="width: 100%;">
<div id="unity-logo"><img src="https://cdn.jsdelivr.net/gh/awaiblecomponent/575@main/logo.png"></div>
<div id="unity-progress-bar-empty" style="display: none;">
<div id="unity-progress-bar-full"></div>
</div>
<div class="spinner"></div>
</div>
</div>

<!-- Fullscreen Button (Desktop Only) -->
<button id="fullscreen-btn" title="Enter Fullscreen (F)">⛶ Fullscreen</button>

<script>
    // Check if device is mobile phone/tablet (NOT desktop with touchscreen)
    const isMobileDevice = () => {
        // Check for mobile user agents
        const mobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        // Check screen size AND touch capability (excludes touch-enabled desktops)
        const isSmallScreen = window.innerWidth <= 1024;
        const isCoarsePointer = window.matchMedia("(pointer: coarse)").matches;
        const isNoHover = window.matchMedia("(hover: none)").matches;
        
        // Mobile if: has mobile UA, OR (small screen AND coarse pointer AND no hover)
        // This allows touch-enabled desktops (which have hover capability or larger screen)
        return mobileUA || (isSmallScreen && isCoarsePointer && isNoHover);
    };

    // If mobile, prevent game from loading
    if (isMobileDevice()) {
        document.getElementById('unity-container').style.display = 'none';
        document.getElementById('loading-cover').style.display = 'none';
        document.body.innerHTML = '<div style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.9); color: white; padding: 40px; border-radius: 10px; font-size: 20px; text-align: center; z-index: 10000; font-family: Arial, sans-serif;">This game is for desktop only.<br>Please access from a computer.</div>';
    } else {
        // Show fullscreen button only on desktop
        setTimeout(() => {
            const btn = document.getElementById('fullscreen-btn');
            if (btn) btn.classList.add('visible');
        }, 100);

        const hideFullScreenButton = "";
        const buildUrl = "https://cdn.jsdelivr.net/gh/awaiblecomponent/575@main/Build";
        const loaderUrl = buildUrl + "/zombieshooterdone.loader.js";
        const config = {
            dataUrl: buildUrl + "/zombieshooterdone.data.br",
            frameworkUrl: buildUrl + "/zombieshooterdone.framework.js",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "OnHitDev",
            productName: "They Are Coming",
            productVersion: "1.19"
        };

        const wasmParts = [
            `${buildUrl}/zombieshooterdone.wasm.br.part0`,
            `${buildUrl}/zombieshooterdone.wasm.br.part1`,
            `${buildUrl}/zombieshooterdone.wasm.br.part2`,
            `${buildUrl}/zombieshooterdone.wasm.br.part3`
        ];

        async function fetchAndMergeWasm() {
            const parts = await Promise.all(wasmParts.map(url =>
                fetch(url).then(r => {
                    if (!r.ok) throw new Error(`Failed to load ${url}`);
                    return r.arrayBuffer();
                })
            ));
            const totalLength = parts.reduce((sum, part) => sum + part.byteLength, 0);
            const merged = new Uint8Array(totalLength);
            let offset = 0;
            for (const part of parts) {
                merged.set(new Uint8Array(part), offset);
                offset += part.byteLength;
            }
            const blob = new Blob([merged], { type: "application/wasm+br" });
            return URL.createObjectURL(blob);
        }

        fetchAndMergeWasm().then(blobUrl => {
            config.codeUrl = blobUrl;

            const script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                createUnityInstance(document.querySelector("#unity-canvas"), config, (progress) => {
                    const loader = document.querySelector("#unity-loading-bar");
                    if (loader) loader.style.width = `${progress * 100}%`;
                }).then((unityInstance) => {
                    myGameInstance = unityInstance;
                    document.querySelector("#loading-cover").style.display = "none";
                }).catch((message) => {
                    console.error("Unity loading error:", message);
                });
            };
            document.body.appendChild(script);
        });

        const container = document.querySelector("#unity-container");
        const canvas = document.querySelector("#unity-canvas");
        const loadingCover = document.querySelector("#loading-cover");
        const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
        const progressBarFull = document.querySelector("#unity-progress-bar-full");
        const spinner = document.querySelector('.spinner');
        const fullscreenBtn = document.querySelector("#fullscreen-btn");

        const canFullscreen = (function () {
            for (const key of [
                'exitFullscreen',
                'webkitExitFullscreen',
                'webkitCancelFullScreen',
                'mozCancelFullScreen',
                'msExitFullscreen',
            ]) {
                if (key in document) {
                    return true;
                }
            }
            return false;
        }());

        loadingCover.style.background = "url('background.png') center / cover";
        loadingCover.style.display = "";

        document.addEventListener('contextmenu', event => event.preventDefault());

        function FocusGame() {
            window.focus();
            canvas.focus();
        }

        window.addEventListener('pointerdown', FocusGame);
        window.addEventListener('touchstart', FocusGame);

        let StartUnityInstance;
        let myGameInstance;
        let ysdk = null;

        let environmentData = {
            language: "en",
            domain: "default_domain",
            deviceType: "desktop",
            isMobile: false,
            isDesktop: true,
            isTablet: false,
            isTV: false,
            appID: "default_app_id",
            browserLang: navigator.language || "en",
            payload: null,
            promptCanShow: false,
            reviewCanShow: false,
            platform: navigator.platform,
            browser: (function() {
                let userAgent = navigator.userAgent;
                if (userAgent.includes("YaBrowser")) return "Yandex";
                if (userAgent.includes("OPR") || userAgent.includes("Opera")) return "Opera";
                if (userAgent.includes("Firefox")) return "Firefox";
                if (userAgent.includes("MSIE") || userAgent.includes("Trident")) return "IE";
                if (userAgent.includes("Edge")) return "Edge";
                if (userAgent.includes("Chrome")) return "Chrome";
                if (userAgent.includes("Safari")) return "Safari";
                return "Other";
            })()
        };
        
        let cloudSaves = 'noData';
        let paymentsData = 'none';
        let playerData = 'noData';
        let player = null;
        let payments = null;
        let initGame = false;
        let nowFullAdOpen = false;

        function GetPayments() { console.warn("GetPayments is not implemented"); return Promise.resolve("none"); }
        function SaveCloud() { console.warn("SaveCloud is not implemented"); }
        function LoadCloud() { console.warn("LoadCloud is not implemented"); return Promise.resolve("noData"); }
        function InitPlayer() { console.warn("InitPlayer is not implemented"); return Promise.resolve("noData"); }

        // FULLSCREEN AD: No ad shown, just skip it
        function FullAdShow() { 
            console.log('[AD REMOVED] FullAdShow called - skipping ad');
            // Immediately close the ad without showing it
            if (myGameInstance) {
                myGameInstance.SendMessage("YandexGame", "CloseFullAd", "true");
            }
        }

        // REWARDED AD: Give reward WITHOUT showing ad
        function RewardedShow(rewardId) { 
            console.log('[REWARD GIVEN] RewardedShow called with rewardId:', rewardId);
            // Immediately complete the rewarded ad and give reward
            if (myGameInstance) {
                // Send message to game that reward was completed successfully
                myGameInstance.SendMessage("YandexGame", "CloseRewardVideo");
                console.log('[REWARD] Player received reward for:', rewardId);
            }
        }

        // STICKY AD: Remove sticky ad banner
        function StickyAdActivity() { 
            console.log('[AD REMOVED] StickyAdActivity called - no sticky ads');
        }

        function Review() { console.warn("Review is not implemented"); }
        function PromptShow() { console.warn("PromptShow is not implemented"); }
        function InitLeaderboards() { console.warn("InitLeaderboards is not implemented"); }
        function GetLeaderboardScores() { console.warn("GetLeaderboardScores is not implemented"); }
        function SetLeaderboardScores() { console.warn("SetLeaderboardScores is not implemented"); }
        function ConsumePurchase() { console.warn("ConsumePurchase is not implemented"); }
        function ConsumePurchases() { console.warn("ConsumePurchases is not implemented"); }

        function InitGame() {
            try {
                console.log('Init Game Success');
                initGame = true;
            } catch (error) {
                console.error("InitGame error:", error);
            }
        }

        // FULLSCREEN FUNCTIONALITY (Desktop + Touch Screens - No Mobile Buttons)
        function toggleFullscreen() {
            const isCurrentlyFullscreen = document.fullscreenElement || 
                                         document.webkitFullscreenElement || 
                                         document.mozFullScreenElement || 
                                         document.msFullscreenElement;

            if (!isCurrentlyFullscreen) {
                // Enter fullscreen
                const elem = document.documentElement;
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                } else if (elem.mozRequestFullScreen) {
                    elem.mozRequestFullScreen();
                } else if (elem.msRequestFullscreen) {
                    elem.msRequestFullscreen();
                }
            } else {
                // Exit fullscreen
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }
        }

        // Fullscreen button click event (mouse only - desktop)
        if (fullscreenBtn) {
            fullscreenBtn.addEventListener('click', toggleFullscreen);
        }

        // Allow F key to toggle fullscreen
        document.addEventListener('keydown', function(e) {
            if (e.key === 'f' || e.key === 'F') {
                toggleFullscreen();
            }
        });

        // Update button text when fullscreen changes
        document.addEventListener('fullscreenchange', updateFullscreenButton);
        document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
        document.addEventListener('mozfullscreenchange', updateFullscreenButton);
        document.addEventListener('msfullscreenchange', updateFullscreenButton);

        function updateFullscreenButton() {
            const isFullscreen = document.fullscreenElement || 
                                document.webkitFullscreenElement || 
                                document.mozFullScreenElement || 
                                document.msFullscreenElement;
            
            if (isFullscreen) {
                fullscreenBtn.textContent = '⛶ Exit Fullscreen';
                fullscreenBtn.classList.add('fullscreen');
            } else {
                fullscreenBtn.textContent = '⛶ Fullscreen';
                fullscreenBtn.classList.remove('fullscreen');
            }
        }

        window.addEventListener("unhandledrejection", function(event) {
            console.warn("Unhandled rejection:", event.reason);
            event.preventDefault();
        });
    }
</script>
